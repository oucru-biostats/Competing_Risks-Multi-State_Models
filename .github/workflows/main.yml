on:
  push:
    branches: [ main ]
  # Optional: allows you to run this manually from the Actions tab
  workflow_dispatch: 

name: Quarto render and publish

permissions:
  contents: write
  pages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # Speeds up package installation on Linux

      - name: Setup renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Install TinyTeX
        run: quarto install tinytex

      - name: Render and Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          # We tell Quarto to render everything before pushing
          render: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}